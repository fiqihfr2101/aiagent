# =============================================================
# H.E.R.M.E.S. Staging Environment
# Completely separated from production — different containers,
# different ports, different database, different Docker network.
# =============================================================

services:
  # --- Application Backend ---
  backend-staging:
    build: ./backend
    container_name: staging-be
    ports:
      - "8001:8000"
    volumes:
      - backend_data_staging:/app/data
    env_file:
      - .env.staging
    environment:
      - TEMPORAL_ADDRESS=temporal-staging:7233
      - DATABASE_URL=postgresql://temporal:temporal@temporal-db-staging:5432/hermes_staging
      - REDIS_URL=redis://redis-staging:6379/0
      - DATABASE_URL=postgresql://temporal:temporal@temporal-db-staging:5432/hermes_staging
    restart: always
    depends_on:
      temporal-staging:
        condition: service_started
      redis-staging:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - hermes-staging

  # --- Application Worker ---
  worker-staging:
    build: ./backend
    container_name: staging-worker
    command: python worker.py
    volumes:
      - backend_data_staging:/app/data
    env_file:
      - .env.staging
    environment:
      - TEMPORAL_ADDRESS=temporal-staging:7233
      - BACKEND_INTERNAL_URL=http://backend-staging:8000
      - DATABASE_URL=postgresql://temporal:temporal@temporal-db-staging:5432/hermes_staging
      - REDIS_URL=redis://redis-staging:6379/0
    restart: always
    depends_on:
      temporal-staging:
        condition: service_started
      backend-staging:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import sys; sys.exit(0)' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - hermes-staging

  # --- Application Frontend ---
  frontend-staging:
    build: ./frontend
    container_name: staging-fe
    ports:
      - "3001:3000"
    depends_on:
      backend-staging:
        condition: service_started
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:8001/ws
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - hermes-staging

  # --- Redis Cache — Staging ---
  redis-staging:
    container_name: staging-redis
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data_staging:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - hermes-staging

  # --- Temporal Cluster — Staging ---
  temporal-staging:
    container_name: staging-temporal
    image: temporalio/auto-setup:1.22.0
    ports:
      - "7234:7233"
      - "8081:8080"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db-staging
    depends_on:
      temporal-db-staging:
        condition: service_started
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address temporal-staging:7233 2>/dev/null | grep -q SERVING || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - hermes-staging

  # --- PostgreSQL — Staging ---
  temporal-db-staging:
    container_name: staging-db
    image: postgres:13
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
      - POSTGRES_DB=temporal
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - hermes-staging

volumes:
  redis_data_staging:
  postgres_data_staging:
  backend_data_staging:

networks:
  hermes-staging:
    driver: bridge
