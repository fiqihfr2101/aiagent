# ============================================================
# H.E.R.M.E.S. AI Agent Orchestrator - CI/CD Pipeline
# ============================================================
# Triggers on push/PR to main/master branch
# Jobs: lint, test, build, deploy
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "18"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Cancel in-progress runs for same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ============================================================
# JOBS
# ============================================================
jobs:
  # ----------------------------------------------------------
  # 1. LINT - Code quality checks
  # ----------------------------------------------------------
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Backend Linting ---
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install flake8 mypy pytest pytest-cov
          pip install -r requirements.txt

      - name: Run flake8 (Backend)
        run: |
          cd backend
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run mypy (Backend)
        run: |
          cd backend
          mypy . --ignore-missing-imports --no-strict-optional || true

      # --- Frontend Linting ---
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint (Frontend)
        run: |
          cd frontend
          npm run lint

      - name: Run TypeScript check (Frontend)
        run: |
          cd frontend
          npx tsc --noEmit

  # ----------------------------------------------------------
  # 2. TEST - Run all tests with coverage
  # ----------------------------------------------------------
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Backend Tests ---
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python test dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          pip install -r requirements.txt

      - name: Run Backend tests with coverage
        run: |
          cd backend
          python -m pytest tests/ \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v \
            --tb=short
        env:
          PYTHONPATH: .
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-key-for-ci

      - name: Upload Backend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-report
          path: backend/htmlcov/
          retention-days: 7

      # --- Frontend Tests ---
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Frontend tests
        run: |
          cd frontend
          npx jest --passWithNoTests --coverage || echo "No test files found, skipping"
        env:
          CI: true

  # ----------------------------------------------------------
  # 3. BUILD - Docker images
  # ----------------------------------------------------------
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check image size
        run: |
          docker images --format "{{.Repository}}:{{.Tag}} - {{.Size}}" | grep "${{ matrix.service }}" || true

  # ----------------------------------------------------------
  # 4. BUNDLE SIZE - Frontend bundle analysis
  # ----------------------------------------------------------
  bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Check bundle size
        run: |
          cd frontend
          echo "=== Bundle Size Report ==="
          if [ -d ".next/static" ]; then
            echo "--- Static Assets ---"
            du -sh .next/static/
            echo ""
            echo "--- Largest JS bundles ---"
            find .next/static -name "*.js" -exec du -h {} + | sort -rh | head -10
            echo ""
            echo "--- Total bundle size ---"
            TOTAL_SIZE=$(find .next/static -type f -exec du -b {} + | awk '{sum+=$1} END {print sum}')
            echo "Total: ${TOTAL_SIZE} bytes (~$((TOTAL_SIZE / 1024 / 1024)) MB)"
            MAX_SIZE=$((5 * 1024 * 1024))  # 5MB limit
            if [ "$TOTAL_SIZE" -gt "$MAX_SIZE" ]; then
              echo "WARNING: Bundle size exceeds 5MB limit!"
              exit 1
            else
              echo "Bundle size OK (under 5MB limit)"
            fi
          else
            echo "No .next/static directory found - build may have failed"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-build
          path: frontend/.next/
          retention-days: 3

  # ----------------------------------------------------------
  # 5. DEPLOY - Staging (auto) & Production (manual)
  # ----------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging environment..."
          echo "Images:"
          echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest"
          echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest"
          # Add your staging deployment commands here
          # Example: docker compose -f docker-compose.staging.yml up -d

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment:
      name: production
      url: https://hermes.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "Deploying to production environment..."
          echo "This requires manual approval via GitHub Environments"
          # Add your production deployment commands here
          # Example: docker compose -f docker-compose.prod.yml up -d

  # ----------------------------------------------------------
  # 6. NOTIFY - Pipeline status notification
  # ----------------------------------------------------------
  notify:
    name: Pipeline Status
    runs-on: ubuntu-latest
    needs: [lint, test, build, bundle-size]
    if: always()
    steps:
      - name: Pipeline Summary
        run: |
          echo "## CI/CD Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bundle Size | ${{ needs.bundle-size.result }} |" >> $GITHUB_STEP_SUMMARY
