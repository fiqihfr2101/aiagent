services:
  backend:
    build: ./backend
    container_name: prod-be
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    env_file:
      - .env
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - REDIS_URL=redis://redis:6379/0
    restart: always
    depends_on:
      temporal:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    build: ./backend
    container_name: prod-worker
    command: python worker.py
    volumes:
      - ./backend/data:/app/data
    env_file:
      - .env
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - BACKEND_INTERNAL_URL=http://backend:8000
    restart: always
    depends_on:
      temporal:
        condition: service_started
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import sys; sys.exit(0)' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build: ./frontend
    container_name: prod-fe
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis Cache
  redis:
    container_name: prod-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Temporal Cluster
  temporal:
    container_name: prod-temporal
    image: temporalio/auto-setup:1.22.0
    ports:
      - "7233:7233"
      - "8080:8080"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
    depends_on:
      temporal-db:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address temporal:7233 | grep SERVING || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  temporal-db:
    container_name: prod-db
    image: postgres:13
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=3
      -c max_replication_slots=3
      -c hot_standby=on
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
      - POSTGRES_DB=temporal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-production-db.sql:/docker-entrypoint-initdb.d/01-init-hermes.sql:ro
      - ./scripts/create-replication-user.sql:/docker-entrypoint-initdb.d/02-replication-user.sql:ro
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # PostgreSQL Read-Only Replica (streaming replication from prod-db)
  replica-db:
    container_name: replica-db
    image: postgres:13
    environment:
      - PGUSER=replicator
      - PGPASSWORD=replicator_password
    ports:
      - "5434:5432"
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./scripts/start-replica.sh:/start-replica.sh:ro
    restart: always
    depends_on:
      temporal-db:
        condition: service_healthy
    command: ["bash", "/start-replica.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U replicator -d hermes"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  redis_data:
  postgres_data:
  postgres_replica_data:
